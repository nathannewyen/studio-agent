databases:
  - name: agent-studio-db
    plan: free
    databaseName: agentstudio
    user: agentstudio

services:
  - type: web
    name: agent-studio-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-studio-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
